name: Claude AI Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Build diff
        run: |
          git diff --unified=3 "origin/${{ github.base_ref }}"...HEAD > pr.diff

      - name: Trim diff
        run: |
          python - <<'PY'
          from pathlib import Path

          diff_path = Path('pr.diff')
          diff = diff_path.read_text(encoding='utf-8', errors='ignore')

          max_chars = 120000
          if len(diff) > max_chars:
              diff = diff[:max_chars] + '\n\n[DIFF TRUNCATED]'

          Path('pr_trimmed.diff').write_text(diff, encoding='utf-8')
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Ask Claude to review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from anthropic import Anthropic

          diff = Path('pr_trimmed.diff').read_text(encoding='utf-8', errors='ignore')
          pr_title = os.getenv('PR_TITLE', '')
          pr_body = os.getenv('PR_BODY', '')

          prompt = f"""
You are a senior Python reviewer.

Review this pull request diff.

Focus only on important issues:
- bugs
- broken logic
- risky SQLAlchemy/FastAPI issues
- security issues
- missing error handling
- tests that are clearly needed
- performance problems
- bad architecture that should block merge

Ignore minor style nitpicks unless they hide a real issue.

Return strictly in this format:

DECISION: APPROVED
or
DECISION: CHANGES_REQUIRED

SUMMARY:
- short summary

FINDINGS:
- bullet list
- each item should be actionable
- reference files/functions when possible

Context:
PR title: {pr_title}

PR body:
{pr_body}

Diff:
{diff}
"""

          client = Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])

          response = client.messages.create(
              model='claude-sonnet-4-5',
              max_tokens=1800,
              temperature=0,
              messages=[
                  {
                      'role': 'user',
                      'content': prompt
                  }
              ]
          )

          text = ''.join(
              block.text for block in response.content
              if getattr(block, 'type', '') == 'text'
          ).strip()

          Path('review.txt').write_text(text, encoding='utf-8')
          PY

      - name: Post review comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude review\n\n${review}`
            });
