name: Claude AI Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FAIL_ON_CHANGES_REQUIRED: "false"
  REVIEW_MODELS: "claude-sonnet-4-20250514,claude-3-5-sonnet-latest,claude-3-5-haiku-latest"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Build diff
        run: git diff --unified=3 "origin/${{ github.base_ref }}"...HEAD > pr.diff

      - name: Build review context
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          diff = Path("pr.diff").read_text(encoding="utf-8", errors="ignore")
          max_diff_chars = 80000
          max_total_chars = 120000
          max_file_chars = 12000
          max_files = 15

          if len(diff) > max_diff_chars:
              diff = diff[:max_diff_chars] + "\n\n[DIFF TRUNCATED]"

          changed_raw = subprocess.check_output(
              ["git", "diff", "--name-only", f"origin/{os.environ['BASE_REF']}...HEAD"],
              text=True,
          )
          changed_files = [line.strip() for line in changed_raw.splitlines() if line.strip()][:max_files]

          sections = ["=== DIFF ===", diff, "", "=== CHANGED FILES CONTEXT ==="]
          used = len("\n".join(sections))

          for rel in changed_files:
              path = Path(rel)
              if not path.exists() or not path.is_file():
                  continue

              content = path.read_text(encoding="utf-8", errors="ignore")
              if len(content) > max_file_chars:
                  content = content[:max_file_chars] + "\n\n[FILE CONTENT TRUNCATED]"
              chunk = f"\n--- FILE: {rel} ---\n{content}\n"

              if used + len(chunk) > max_total_chars:
                  sections.append("\n[CONTEXT TRUNCATED DUE TO SIZE LIMIT]")
                  break

              sections.append(chunk)
              used += len(chunk)

          Path("review_context.txt").write_text("\n".join(sections), encoding="utf-8")
          PY

      - name: Collect prior Claude review comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const claudeComments = comments
              .filter((c) => c.user?.login === 'github-actions' && (c.body || '').includes('<!-- claude-review-comment -->'))
              .slice(-6)
              .map((c) => {
                const body = (c.body || '')
                  .replace(/```[\s\S]*?```/g, '[code block omitted]')
                  .trim();
                return `--- prior review at ${c.created_at} ---\n${body}`;
              });

            const text = claudeComments.length
              ? claudeComments.join('\n\n')
              : 'None';

            fs.writeFileSync('prior_claude_reviews.txt', text, 'utf8');

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Ask Claude to review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REVIEW_MODELS: ${{ env.REVIEW_MODELS }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from anthropic import Anthropic

          if not os.getenv("ANTHROPIC_API_KEY"):
              text = (
                  "DECISION: CHANGES_REQUIRED\n\n"
                  "SUMMARY:\n"
                  "- Missing `ANTHROPIC_API_KEY` GitHub secret.\n\n"
                  "FINDINGS:\n"
                  "- Add repository secret `ANTHROPIC_API_KEY` in "
                  "Settings -> Secrets and variables -> Actions."
              )
              Path("review.txt").write_text(text, encoding="utf-8")
              Path("review_decision.txt").write_text("CHANGES_REQUIRED", encoding="utf-8")
              raise SystemExit(0)

          review_context = Path("review_context.txt").read_text(encoding="utf-8", errors="ignore")
          prior_reviews = Path("prior_claude_reviews.txt").read_text(encoding="utf-8", errors="ignore")
          pr_title = os.getenv("PR_TITLE", "")
          pr_body = os.getenv("PR_BODY", "")

          prompt = (
              "You are a senior Python reviewer.\n\n"
              "Review this pull request diff.\n\n"
              "Focus only on important issues:\n"
              "- bugs\n"
              "- broken logic\n"
              "- risky SQLAlchemy/FastAPI issues\n"
              "- security issues\n"
              "- missing error handling\n"
              "- tests that are clearly needed\n"
              "- performance problems\n"
              "- bad architecture that should block merge\n\n"
              "Ignore minor style nitpicks unless they hide a real issue.\n\n"
              "Return strictly in this format:\n\n"
              "DECISION: APPROVED\n"
              "or\n"
              "DECISION: CHANGES_REQUIRED\n\n"
              "SUMMARY:\n"
              "- short summary\n\n"
              "FINDINGS:\n"
              "For each finding use this exact mini-template:\n"
              "- Title: <short issue title>\n"
              "  Location: <file>:<line or line-range> (or 'unknown')\n"
              "  Severity: <high|medium|low>\n"
              "  Evidence: <specific problematic code/behavior from diff>\n"
              "  Why it matters: <impact/risk>\n"
              "  Fix options:\n"
              "  - Minimal: <smallest safe fix>\n"
              "  - Robust: <preferred long-term fix>\n\n"
              "If no important issues found, write:\n"
              "FINDINGS:\n"
              "- None\n\n"
              "Rules:\n"
              "- Always include file paths and line hints when possible.\n"
              "- Do not suggest vague fixes; provide concrete implementation direction.\n"
              "- Keep each finding concise but actionable.\n\n"
              "Quality gate (mandatory):\n"
              "- Report only issues that are directly evidenced in the provided current context.\n"
              "- Do not repeat previously-fixed findings.\n"
              "- If you cannot point to exact current code evidence, do not report it.\n"
              "- Avoid speculative security claims without concrete exploit path in current code.\n\n"
              "Anti-repeat gate (mandatory):\n"
              "- You will receive prior Claude review comments below.\n"
              "- Do not repeat a prior finding unless you can cite fresh evidence from the current diff/context\n"
              "  that the same issue still exists.\n"
              "- If a previous finding appears resolved in current code, do not re-report it.\n"
              "- Prefer fewer, high-confidence findings over exhaustive or speculative lists.\n"
              "- Maximum 5 findings total.\n\n"
              "Pre-submit checklist (mandatory internal check before output):\n"
              "- Config validation correctness\n"
              "- Error handling consistency\n"
              "- Logging sensitivity (no secrets/internal leakage)\n"
              "- Runtime fallback behavior\n"
              "- Test coverage for introduced behavior\n\n"
              f"Context:\nPR title: {pr_title}\n\n"
              f"PR body:\n{pr_body}\n\n"
              f"Prior Claude reviews:\n{prior_reviews}\n\n"
              f"Repository context (diff + changed files):\n{review_context}\n"
          )

          models_raw = os.environ.get("REVIEW_MODELS", "")
          candidate_models = [m.strip() for m in models_raw.split(",") if m.strip()]
          if not candidate_models:
              candidate_models = ["claude-3-5-sonnet-latest"]

          client = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          text = ""
          last_error = None

          for model in candidate_models:
              try:
                  response = client.messages.create(
                      model=model,
                      max_tokens=1800,
                      temperature=0,
                      messages=[{"role": "user", "content": prompt}],
                  )
                  text = "".join(
                      block.text for block in response.content if getattr(block, "type", "") == "text"
                  ).strip()
                  break
              except Exception as exc:
                  last_error = exc
                  err_text = str(exc).lower()
                  if "not_found_error" in err_text or "model" in err_text and "not found" in err_text:
                      continue
                  break

          if not text:
              text = (
                  "DECISION: CHANGES_REQUIRED\n\n"
                  "SUMMARY:\n"
                  "- Claude review request failed.\n\n"
                  "FINDINGS:\n"
                  f"- Anthropic API error: {type(last_error).__name__}: {last_error}"
              )

          if "DECISION: CHANGES_REQUIRED" in text:
              decision = "CHANGES_REQUIRED"
          elif "DECISION: APPROVED" in text:
              decision = "APPROVED"
          else:
              text = (
                  "DECISION: CHANGES_REQUIRED\n\n"
                  "SUMMARY:\n"
                  "- Claude output format was invalid.\n\n"
                  "FINDINGS:\n"
                  "- Reviewer output did not include a valid `DECISION` header."
              )
              decision = "CHANGES_REQUIRED"

          Path("review.txt").write_text(text, encoding="utf-8")
          Path("review_decision.txt").write_text(decision, encoding="utf-8")
          PY

      - name: Post review comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            const runId = process.env.GITHUB_RUN_ID || 'unknown';
            const body = `## Claude review (run ${runId})\n\n${review}\n\n<!-- claude-review-comment -->`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if review requires changes
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          fail_on_changes_required = os.getenv("FAIL_ON_CHANGES_REQUIRED", "false").lower() == "true"
          decision = Path("review_decision.txt").read_text(encoding="utf-8").strip()
          if fail_on_changes_required and decision == "CHANGES_REQUIRED":
              raise SystemExit("Claude requested changes.")
          PY
